project:
  name: "kitex-protobuf-rpc-service"
  display_name: "Kitex Protobuf RPC微服务"
  service_type: ["rpc"]
  description: "基于Kitex+Protobuf+GORM+Redis构建的纯同步RPC微服务"
  tech_stack: ["Golang", "Kitex", "Protobuf", "GORM", "Redis"]
  spec_version: "v1.0"
  align_spec: "Kitex_Protobuf_RPC_Standard"
  language: "zh-CN"
  comment_rule: "single_line"
  string_rule: "backtick"
  loop_rule: "infinite_for"
  struct_init_rule: "aggregate"
  variable_rule: "auto_infer"
  shadow_variable: "disable"

# ====================== 工程目录结构（强制对齐） ======================
dir_struct:
  root_keep:
    - "idl"
    - "kitex_gen"
    - "layout"
    - "conf"
  biz:
    - "biz/service"
    - "biz/logic"
    - "biz/convert"
    - "biz/dal/gormL"
    - "biz/dal/redis"

# ====================== 目录专属约束 ======================
dir_rule:
  conf:
    only_yaml: true
    forbid_go_file: true
  kitex_gen:
    manual_edit_forbid: true
  idl:
    only_protobuf: true

# ====================== DAL层全局规范 ======================
dal:
  db_mode: "multi_db_isolate"
  init_file: "biz/dal/gormL/init.go"
  # 查询构造器规范
  where:
    enable: true
    base_struct: "gormL.BaseWhere"
    file_naming: "table_name_lower"
    struct_naming: "table_camel+ListWhere"
    private_method: true
    raw_sql: false
  # Repo仓储规范
  repo:
    singleton: false
    must_get_where: true
    new_instance: true
    # 强制：Where对象唯一入口为Repo.GetWhere()
    where_only_from_repo: true
  # 全局统一分页规范
  page:
    limit_offset_mode: true
    limit_plus_one: true
    auto_has_more: true
    auto_clip_list: true
    page_struct: "widget.Page"

# ====================== 分层依赖白名单（严格只读） ======================
deps_whitelist:
  biz/service: ["biz/logic", "biz/convert", "biz/dal"]
  biz/logic: ["biz/convert", "biz/dal"]
  biz/convert: []
  biz/dal: []

# ====================== 分层职责强制约束 ======================
layer_constraint:
  service_can_hold_light_biz: true
  service_can_hold_cache: true
  service_forbid_heavy_biz: true
 service_forbid_raw_sql: true
  logic_forbid_depend_upper: true
  convert_forbid_biz_logic: true
  dal_forbid_hard_code: true

# ====================== 编码强制规则 ======================
code_rule:
  global_biz_var: false
  var_shadow: false
  lint_nolint: true
  kitex_protobuf_standard: true

# ====================== 全局红线禁止规则 ======================
forbidden_rule:
  - "禁止logic层反向依赖service上层模块"
  - "禁止convert层编写任何业务逻辑、判断逻辑"
  - "禁止Repo全局单例，必须新建实例"
  - "禁止手动new实例化Where结构体，必须通过Repo.GetWhere()获取"
  - "禁止手写裸SQL，全部使用where链式构造器"
 - "禁止跨层、反向非法依赖"
  - "禁止kitex_gen目录手动修改"
  - "禁止conf目录存放任何Go源码文件"
  - "禁止硬编码业务常量、状态、时间等数据"